---
name: Test

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke:
    name: Smoke test add-on
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 🏗️ Build add-on image
        run: docker build -t addman-test ./addman

      - name: 🧪 Run smoke test against mock Supervisor
        run: bash tests/smoke_test.sh addman-test
