---
name: Test

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke:
    name: Smoke test add-on
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: 🏗️ Build add-on image
        run: docker build -t addman-test ./addman

      - name: 🧪 Run smoke test against mock Supervisor
        run: bash tests/smoke_test.sh addman-test
