---
# Smoke-test scenario: one brand-new repository and one not-yet-installed
# add-on. Drives the full reconcile path: add repo -> reload -> install ->
# configure (boot/watchdog/auto_update/ingress_panel) -> validate+set options
# -> start. Also covers declarative removal via `state: absent`.
repositories:
  - https://github.com/example/test-repo

addons:
  test_addon:
    auto_start: true
    auto_restart: true
    boot: auto
    watchdog: true
    auto_update: true
    ingress_panel: false
    options:
      some_key: some_value
  # The mock reports this add-on as installed, so AddMan must uninstall it.
  absent_addon:
    state: absent
