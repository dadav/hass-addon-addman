---
name: AddMan
version: 2.2.0
slug: addman
description: Declaratively install, configure and remove add-ons from a git-managed YAML file.
url: https://github.com/dadav/hass-addon-addman/tree/main/addman
init: false
hassio_api: true
hassio_role: manager
map:
  - config:rw
arch:
  - aarch64
  - amd64
options:
  check_interval: 600
  check_updates_x_iterations: 6
  config_file: /config/addman.yaml
  dry_run: false
  log_level: info
  watch_config_changes: false
schema:
  check_interval: int(1,)
  check_updates_x_iterations: int(0,)
  config_file: str
  dry_run: bool
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  watch_config_changes: bool
image: ghcr.io/dadav/addon-addman
